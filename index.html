<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboSpot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap" id="wrap">

    <div id="bgImg" aria-hidden="true"></div>

    <!-- Corners -->
    <aside class="corners" aria-hidden="true">
      <div class="ci tl"><div class="csq"></div></div>
      <nav class="ci tr">
        <a href="#">Música</a> |
        <a href="#">Playlist</a> |
        <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      </nav>
      <div class="ci bl">TurboSpot v1.0</div>
      <time class="ci br" id="clk">00:00:00</time>
    </aside>

    <!-- ══════════════════════════════════════════
         PLAYER ZONE — canto inferior esquerdo
         Sempre visível. Player + upload juntos.
    ═══════════════════════════════════════════ -->
    <div id="playerZone">

      <!-- Upload bar (acima do player) -->
      <div id="uploadBar" class="upload-bar">
        <input type="file" id="fileInput" accept="audio/*">
        <div id="dropzone" class="dropzone">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" width="13" height="13">
            <path d="M17 13v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2"/>
            <polyline points="14 7 10 3 6 7"/><line x1="10" y1="3" x2="10" y2="13"/>
          </svg>
          <span id="dropLabel">Arrastar ficheiro de áudio</span>
        </div>
      </div>

      <!-- Player -->
      <div id="player" aria-label="Reprodutor">

        <!-- Vinyl thumb -->
        <div class="vinyl-wrap" aria-hidden="true">
          <div id="pCover"></div>
          <div class="vinyl-grooves"></div>
          <div class="vinyl-center"></div>
        </div>

        <!-- Right column -->
        <div class="p-right">
          <div class="p-top">
            <div class="p-info">
              <p class="p-title"  id="pTitle">Sem faixa</p>
              <p class="p-artist" id="pArtist">carregar ficheiro ou pesquisar</p>
            </div>
            <button class="p-play" id="pPlayBtn" aria-label="Play / Pause">
              <svg viewBox="0 0 22 22" fill="currentColor" width="15" height="15"><polygon points="5,3 19,11 5,19"/></svg>
            </button>
          </div>

          <div class="p-prog-row">
            <span class="p-time" id="pCur">0:00</span>
            <div class="p-track" id="pTrack">
              <div class="p-fill"  id="pFill"></div>
              <div class="p-thumb" id="pThumb"></div>
            </div>
            <span class="p-time" id="pDur">0:00</span>
          </div>

          <div class="p-bottom">
            <span class="p-vol-ic" id="volIc" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12">
                <polygon points="3,6 6,4 6,12 3,10"/>
                <path d="M9 5.5a4 4 0 0 1 0 5"/><path d="M11.5 3.5a7 7 0 0 1 0 9"/>
              </svg>
            </span>
            <input type="range" class="vol" id="volSlider" min="0" max="100" value="80" aria-label="Volume">
            <div class="p-eq" aria-hidden="true">
              <span class="eq-b"></span><span class="eq-b"></span>
              <span class="eq-b"></span><span class="eq-b"></span>
            </div>
          </div>
        </div>

      </div><!-- #player -->
    </div><!-- #playerZone -->

    <!-- Project list -->
    <main>
      <h1 class="sr-only">TurboSpot</h1>
      <ul class="plist" id="plist"></ul>
    </main>

    <!-- Modal: Track -->
    <div class="overlay" id="ovTrack">
      <div class="modal">
        <button class="mclose" onclick="closeModal('ovTrack')">&#215;</button>
        <div class="modal-head">
          <div class="modal-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
              <path d="M7 15V5l10-2v10"/><circle cx="4.5" cy="15" r="2.5"/><circle cx="14.5" cy="13" r="2.5"/>
            </svg>
          </div>
          Download Track
        </div>
        <div class="modal-body">
          <input type="text" id="trackLink" placeholder="Link ou ID Spotify">
          <button class="btn btn-p" id="btnSearch" onclick="searchTrack()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13">
              <circle cx="7" cy="7" r="5"/><path d="M12 12l2.5 2.5"/>
            </svg>
            Pesquisar
          </button>
          <div id="trackPrev"></div>
        </div>
      </div>
    </div>

    <!-- Modal: Playlist -->
    <div class="overlay" id="ovPlaylist">
      <div class="modal">
        <button class="mclose" onclick="closeModal('ovPlaylist')">&#215;</button>
        <div class="modal-head">
          <div class="modal-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
              <line x1="3" y1="5" x2="17" y2="5"/>
              <line x1="3" y1="9" x2="17" y2="9"/>
              <line x1="3" y1="13" x2="17" y2="13"/>
            </svg>
          </div>
          Download Playlist
        </div>
        <div class="modal-body">
          <input type="text" id="playlistLink" placeholder="Link da playlist Spotify">
          <div class="btn-row">
            <button class="btn btn-s btn-see" onclick="searchPlaylist()">Ver conteúdo</button>
            <button class="btn btn-p btn-dl"  onclick="downloadPlaylist()">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13">
                <path d="M13 10v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3"/>
                <polyline points="5 7 8 10 11 7"/><line x1="8" y1="10" x2="8" y2="2"/>
              </svg>
              Descarregar
            </button>
          </div>
          <div class="trk-list" id="trkList"></div>
        </div>
      </div>
    </div>

  </div><!-- .wrap -->

  <!-- jsmediatags: extract embedded cover art from MP3/FLAC/etc -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrambleTextPlugin.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
